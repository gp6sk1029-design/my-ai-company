# Cloudflare Pages 設定（料理レシピ献立アプリ）
#
# ローカル動作確認:
#   export GEMINI_API_KEY='xxx'
#   npx wrangler pages dev public --compatibility-date=2024-11-01 --d1=DB=kondate-kun-db
#
# 本番環境変数:
#   GEMINI_API_KEY は Cloudflare ダッシュボードの「Variables and Secrets」で設定
#   D1 バインディングは下記 [[d1_databases]] でリンク
#
# D1 スキーマ反映:
#   npx wrangler d1 execute kondate-kun-db --remote --file=schema.sql

name = "kondate-kun"
compatibility_date = "2024-11-01"
pages_build_output_dir = "public"

[[d1_databases]]
binding = "DB"
database_name = "kondate-kun-db"
database_id = "c2ce6e9d-f35b-48be-af30-9405926d5ff1"

[vars]
# 公開しても問題ない設定のみ。GEMINI_API_KEY は絶対にここに書かない。
