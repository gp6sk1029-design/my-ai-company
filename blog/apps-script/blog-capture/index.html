<body>
  <!-- 上部ステータスバー -->
  <div class="top-row">
    <div class="avatar">📸</div>
    <div class="pending-pill" id="pending-pill">
      <span id="pending-count">0</span>
    </div>
  </div>

  <!-- 大きなタイトル -->
  <h1 class="page-title">何を送りますか？</h1>

  <!-- 記事選択（検索バー風） -->
  <div class="article-bar">
    <span class="article-bar-icon">🔖</span>
    <select id="article-select" class="article-bar-select">
      <option value="">記事を選ぶ…</option>
    </select>
    <span class="article-bar-arrow">⌄</span>
  </div>
  <details class="new-article-details">
    <summary>＋ 新しい記事を作成</summary>
    <div class="new-article-form">
      <input type="text" id="new-article-title" class="text-field" placeholder="例: Garmin Venu 4 レビュー" autocomplete="off">
      <button id="use-new-article" type="button" class="btn-secondary">この記事名で使う</button>
    </div>
  </details>

  <!-- カラフル丸アイコン グリッド（3列） -->
  <div class="circle-grid">
    <label class="circle-item" for="input-photo">
      <div class="circle circle-red">
        <span class="circle-icon">📷</span>
      </div>
      <span class="circle-label">写真を撮る</span>
      <input type="file" id="input-photo" accept="image/*" capture="environment" hidden>
    </label>
    <label class="circle-item" for="input-video">
      <div class="circle circle-purple">
        <span class="circle-icon">🎥</span>
      </div>
      <span class="circle-label">動画を撮る</span>
      <input type="file" id="input-video" accept="video/*" capture="environment" hidden>
    </label>
    <label class="circle-item" for="input-files">
      <div class="circle circle-orange">
        <span class="circle-icon">🖼️</span>
      </div>
      <span class="circle-label">スクショ選択</span>
      <input type="file" id="input-files" accept="image/*,video/*,application/pdf" multiple hidden>
    </label>
  </div>

  <!-- 一時保存セクション -->
  <section class="queue-section">
    <div class="section-header">
      <h2>一時保存</h2>
      <span class="queue-count"><span id="queue-count">0</span>件</span>
    </div>
    <div id="queue-list" class="queue-grid"></div>
    <div id="queue-empty" class="queue-empty">
      撮ったもの・選んだものがここに並びます
    </div>
  </section>

  <!-- 状態表示 & 注意書き -->
  <div class="status-line" id="status-area" aria-live="polite"></div>
  <p class="note">
    💡 OS標準のカメラを使うため、写真・動画は一時的に端末の写真アプリにも保存されます。
  </p>

  <div class="bottom-spacer"></div>

  <!-- 底部の大きなアクションバー -->
  <footer class="action-bar">
    <button id="clear-queue" type="button" class="btn-ghost" disabled>
      <span>破棄</span>
    </button>
    <button id="upload-all" type="button" class="btn-primary" disabled>
      <span class="btn-primary-icon">⬆️</span>
      <span class="btn-primary-label">すべて転送</span>
      <span id="upload-all-count" class="btn-primary-sub"></span>
    </button>
  </footer>

  <div id="toast" class="toast hidden"></div>

  <script>
    window.SMALL_FILE_LIMIT = <?= smallFileLimit ?>;
  </script>
