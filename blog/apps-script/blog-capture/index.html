<body>
  <header>
    <h1>📸 blog-capture</h1>
    <span id="pending-count" class="badge">0</span>
  </header>

  <main>
    <section class="article-selector">
      <label for="article-select">記事を選ぶ</label>
      <select id="article-select">
        <option value="">読み込み中...</option>
      </select>
      <details>
        <summary>新規記事を作成</summary>
        <div class="new-article">
          <input type="text" id="new-article-title" placeholder="例: Garmin Venu 4 レビュー">
          <button id="use-new-article" type="button">この記事名を使う</button>
        </div>
      </details>
    </section>

    <section class="capture-section">
      <h2>素材を取り込む</h2>
      <div class="action-grid">
        <label class="action-btn" for="input-photo">
          <span class="action-icon">📷</span>
          <span class="action-label">写真を撮る</span>
          <input type="file" id="input-photo" accept="image/*" capture="environment" hidden>
        </label>
        <label class="action-btn" for="input-video">
          <span class="action-icon">🎥</span>
          <span class="action-label">動画を撮る</span>
          <input type="file" id="input-video" accept="video/*" capture="environment" hidden>
        </label>
        <label class="action-btn" for="input-files">
          <span class="action-icon">📁</span>
          <span class="action-label">ファイル選択</span>
          <input type="file" id="input-files" accept="image/*,video/*,application/pdf" multiple hidden>
        </label>
      </div>
      <p class="note">
        📌 OS標準のカメラを使用するため、一時的に端末のカメラロールに保存されます。
        転送完了後、手動で削除してください。
      </p>
    </section>

    <section class="queue">
      <h2>一時保存（<span id="queue-count">0</span>）</h2>
      <div id="queue-list"></div>
      <div class="queue-actions">
        <button id="upload-all" class="primary" type="button" disabled>すべて転送</button>
        <button id="clear-queue" class="secondary" type="button" disabled>すべて破棄</button>
      </div>
    </section>

    <section class="status" id="status-area" aria-live="polite"></section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script>
    // HtmlServiceから埋め込む定数
    window.SMALL_FILE_LIMIT = <?= smallFileLimit ?>;
