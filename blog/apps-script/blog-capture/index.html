<body>
  <header class="app-header">
    <h1>📸 blog-capture</h1>
    <span id="pending-count" class="badge">0</span>
  </header>

  <main class="app-main">
    <!-- 記事選択 -->
    <section class="card">
      <div class="card-label">記事を選ぶ</div>
      <select id="article-select" class="select-field">
        <option value="">読み込み中...</option>
      </select>
      <details class="new-article-details">
        <summary>＋ 新規記事を作成</summary>
        <div class="new-article-form">
          <input type="text" id="new-article-title" class="text-field" placeholder="例: Garmin Venu 4 レビュー" autocomplete="off">
          <button id="use-new-article" type="button" class="btn-secondary">この記事名で使う</button>
        </div>
      </details>
    </section>

    <!-- アクション大ボタン -->
    <section class="actions">
      <label class="action-tile" for="input-photo">
        <span class="action-tile-icon">📷</span>
        <span class="action-tile-label">写真を撮る</span>
        <input type="file" id="input-photo" accept="image/*" capture="environment" hidden>
      </label>
      <label class="action-tile" for="input-video">
        <span class="action-tile-icon">🎥</span>
        <span class="action-tile-label">動画を撮る</span>
        <input type="file" id="input-video" accept="video/*" capture="environment" hidden>
      </label>
      <label class="action-tile wide" for="input-files">
        <span class="action-tile-icon">📁</span>
        <span class="action-tile-label">ファイル・スクショを選ぶ</span>
        <input type="file" id="input-files" accept="image/*,video/*,application/pdf" multiple hidden>
      </label>
    </section>

    <!-- 一時保存 -->
    <section class="card queue-card">
      <div class="card-header">
        <div class="card-label">一時保存</div>
        <span class="queue-count"><span id="queue-count">0</span> 件</span>
      </div>
      <div id="queue-list" class="queue-grid"></div>
      <div id="queue-empty" class="queue-empty">
        ここに撮ったもの・選んだものが並びます
      </div>
    </section>

    <!-- 状態表示 -->
    <div class="status-line" id="status-area" aria-live="polite"></div>

    <!-- 注意書き -->
    <p class="note">
      OS標準のカメラを使うため、写真・動画は一時的に端末の写真アプリにも保存されます。転送完了後に削除してください。
    </p>

    <!-- 底部固定のためのスペーサー -->
    <div class="bottom-spacer"></div>
  </main>

  <!-- 底部固定アクションバー -->
  <footer class="action-bar">
    <button id="clear-queue" type="button" class="btn-ghost" disabled>破棄</button>
    <button id="upload-all" type="button" class="btn-primary" disabled>
      <span class="btn-primary-label">すべて転送</span>
      <span id="upload-all-count" class="btn-primary-sub"></span>
    </button>
  </footer>

  <div id="toast" class="toast hidden"></div>

    window.SMALL_FILE_LIMIT = <?= smallFileLimit ?>;
