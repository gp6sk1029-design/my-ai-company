<style>
  :root {
    --bg: #000000;
    --bg-card: #1c1c1e;
    --bg-elevated: #2c2c2e;
    --bg-input: #1c1c1e;
    --text: #ffffff;
    --text-secondary: #ebebf5;
    --text-muted: #8e8e93;
    --accent: #56CCF2;
    --accent-dark: #0a84ff;
    --danger: #ff453a;
    --success: #30d158;
    --warning: #ffd60a;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --radius: 16px;
    --radius-lg: 22px;
    --sa-top: env(safe-area-inset-top, 0);
    --sa-bot: env(safe-area-inset-bottom, 0);
    --sa-left: env(safe-area-inset-left, 0);
    --sa-right: env(safe-area-inset-right, 0);
    --header-h: 48px;
    --footer-h: 80px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f2f2f7;
      --bg-card: #ffffff;
      --bg-elevated: #ffffff;
      --bg-input: #ffffff;
      --text: #000000;
      --text-secondary: #3a3a3c;
      --text-muted: #6d6d72;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.16);
    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Hiragino Sans', sans-serif;
    background: var(--bg); color: var(--text);
    overscroll-behavior-y: none;
    -webkit-font-smoothing: antialiased;
    font-size: 16px;
  }
  body {
    min-height: 100vh; min-height: 100dvh;
    width: 100%;
    overflow-x: hidden;
  }
  .hidden { display: none !important; }

  /* ─── ヘッダー（固定・全幅） ─── */
  .app-header {
    position: sticky; top: 0; z-index: 50;
    padding: calc(var(--sa-top) + 10px) 16px 10px;
    background: rgba(0,0,0,0.8);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 0.5px solid var(--border);
  }
  @media (prefers-color-scheme: light) {
    .app-header { background: rgba(242,242,247,0.85); }
  }
  .app-header h1 {
    font-size: 19px; font-weight: 700; letter-spacing: -0.3px;
  }
  .badge {
    background: var(--accent); color: #000;
    font-weight: 700; font-size: 14px;
    border-radius: 999px; padding: 4px 11px; min-width: 28px; text-align: center;
  }

  /* ─── メインコンテンツ（全幅） ─── */
  .app-main {
    padding: 12px;
    padding-bottom: calc(var(--footer-h) + var(--sa-bot) + 16px);
    padding-left: calc(12px + var(--sa-left));
    padding-right: calc(12px + var(--sa-right));
    display: flex; flex-direction: column; gap: 10px;
    width: 100%;
  }

  /* ─── カード ─── */
  .card {
    background: var(--bg-card); border-radius: var(--radius);
    padding: 14px 14px 16px;
  }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .card-label {
    font-size: 12px; font-weight: 700; color: var(--text-muted);
    letter-spacing: 0.5px; text-transform: uppercase;
    margin-bottom: 8px; display: block;
  }
  .queue-count { font-size: 14px; color: var(--text-muted); font-weight: 500; }

  /* ─── 入力フィールド ─── */
  .select-field, .text-field {
    width: 100%; padding: 15px 14px;
    background: var(--bg-input); color: var(--text);
    border: 1px solid var(--border); border-radius: 12px;
    font-size: 17px !important; font-family: inherit;
    appearance: none; -webkit-appearance: none;
  }
  .select-field {
    background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 20 20'%3E%3Cpath d='M5 8l5 5 5-5' stroke='%238e8e93' stroke-width='1.8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 16px center;
    padding-right: 40px;
  }
  .new-article-details { margin-top: 10px; }
  .new-article-details summary {
    list-style: none; cursor: pointer;
    color: var(--accent); font-size: 15px; font-weight: 600;
    padding: 10px 0; user-select: none;
  }
  .new-article-details summary::-webkit-details-marker { display: none; }
  .new-article-form { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }

  /* ─── アクションタイル（写真/動画は大きめ・縦に太く） ─── */
  .actions {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .action-tile {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--bg-card); border-radius: var(--radius);
    padding: 26px 12px;
    cursor: pointer; user-select: none;
    transition: transform 0.1s ease, background 0.15s ease;
    min-height: 140px;
    border: 1px solid var(--border);
  }
  .action-tile:active { transform: scale(0.97); background: var(--bg-elevated); }
  .action-tile.wide {
    grid-column: 1 / -1;
    flex-direction: row;
    justify-content: center;
    gap: 12px;
    padding: 20px 16px;
    min-height: 0;
  }
  .action-tile.wide .action-tile-icon { font-size: 28px; margin: 0; }
  .action-tile.wide .action-tile-label { font-size: 17px; }
  .action-tile-icon { font-size: 44px; line-height: 1; margin-bottom: 12px; filter: grayscale(0); }
  .action-tile-label { font-size: 15px; font-weight: 700; color: var(--text); text-align: center; letter-spacing: -0.2px; }

  /* ─── 一時保存キュー ─── */
  .queue-card { padding-bottom: 14px; }
  .queue-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    min-height: 0;
  }
  .queue-item {
    position: relative; aspect-ratio: 1;
    background: var(--bg-elevated); border-radius: 8px; overflow: hidden;
  }
  .queue-item img, .queue-item video {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .queue-item .type-badge {
    position: absolute; top: 4px; left: 4px;
    background: rgba(0,0,0,0.65); color: #fff;
    font-size: 10px; padding: 1px 5px; border-radius: 3px;
    font-weight: 600; letter-spacing: 0.3px;
  }
  .queue-item .delete-btn {
    position: absolute; top: 4px; right: 4px;
    background: rgba(0,0,0,0.65); color: #fff; border: none;
    width: 24px; height: 24px; border-radius: 50%;
    cursor: pointer; font-size: 14px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .queue-item .delete-btn:active { background: var(--danger); }
  .queue-item .status-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.8); color: #fff;
    font-size: 10px; text-align: center; padding: 3px;
  }
  .queue-empty {
    text-align: center; padding: 36px 8px;
    font-size: 14px; color: var(--text-muted);
    border: 1.5px dashed var(--border-strong); border-radius: 10px;
  }

  /* ─── 状態表示 & 注意書き ─── */
  .status-line {
    text-align: center; min-height: 20px;
    font-size: 13px; color: var(--text-muted);
    padding: 4px 0;
  }
  .note {
    padding: 11px 13px;
    background: var(--bg-card); border-radius: 12px;
    font-size: 12px; color: var(--text-muted); line-height: 1.55;
    border-left: 3px solid var(--warning);
  }

  /* ─── 固定ボタンバー ─── */
  .action-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    padding: 10px 12px calc(10px + var(--sa-bot));
    padding-left: calc(12px + var(--sa-left));
    padding-right: calc(12px + var(--sa-right));
    background: rgba(0,0,0,0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-top: 0.5px solid var(--border);
    display: flex; gap: 10px; align-items: stretch;
  }
  @media (prefers-color-scheme: light) {
    .action-bar { background: rgba(242,242,247,0.9); }
  }

  .btn-primary {
    flex: 1; min-height: 56px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 8px 16px;
    background: var(--accent); color: #000; border: none;
    border-radius: 16px; font-size: 18px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: transform 0.1s, opacity 0.1s;
    letter-spacing: -0.2px;
  }
  .btn-primary:active:not(:disabled) { transform: scale(0.98); opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-primary-label { line-height: 1.2; }
  .btn-primary-sub { font-size: 12px; font-weight: 600; opacity: 0.75; margin-top: 2px; }
  .btn-primary-sub:empty { display: none; }

  .btn-ghost {
    min-width: 84px; min-height: 56px; padding: 0 18px;
    background: transparent; color: var(--danger);
    border: 1px solid var(--border-strong); border-radius: 16px;
    font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn-ghost:active:not(:disabled) { background: rgba(255,69,58,0.12); }
  .btn-ghost:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-secondary {
    min-height: 46px; padding: 0 14px;
    background: var(--bg-elevated); color: var(--text);
    border: none; border-radius: 11px;
    font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn-secondary:active { opacity: 0.7; }

  /* ─── トースト ─── */
  .toast {
    position: fixed;
    bottom: calc(var(--footer-h) + var(--sa-bot) + 16px);
    left: 50%; transform: translateX(-50%);
    max-width: calc(100% - 24px);
    background: var(--bg-elevated); color: var(--text);
    padding: 13px 22px; border-radius: 999px;
    border: 1px solid var(--border-strong);
    font-size: 14px; font-weight: 500; z-index: 100;
    box-shadow: 0 8px 28px rgba(0,0,0,0.5);
    animation: slideUp 0.25s ease;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .toast.hidden { display: none; }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }
  @keyframes slideUp {
    from { transform: translate(-50%, 20px); opacity: 0; }
    to { transform: translate(-50%, 0); opacity: 1; }
  }

  /* iOS Safari のフォーカス時ズーム回避 */
  input, select, textarea { font-size: 16px; }

  /* タブレット以上のサイズ（MacBook閲覧時）は中央寄せ */
  @media (min-width: 640px) {
    .app-main {
      max-width: 560px; margin: 0 auto;
      padding: 16px 18px calc(var(--footer-h) + 20px);
    }
    .app-header { justify-content: center; gap: 16px; }
    .app-header h1 { font-size: 20px; }
    .action-bar > * { max-width: 560px; }
    .action-bar { justify-content: center; }
    .action-bar-inner { max-width: 560px; margin: 0 auto; display: flex; gap: 10px; width: 100%; }
  }
</style>
