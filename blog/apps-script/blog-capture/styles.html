<style>
  :root {
    --bg: #0a0a0a;
    --bg-card: #1c1c1e;
    --bg-elevated: #2c2c2e;
    --bg-input: #1c1c1e;
    --text: #ffffff;
    --text-secondary: #ebebf5;
    --text-muted: #8e8e93;
    --accent: #56CCF2;
    --accent-dark: #0a84ff;
    --danger: #ff453a;
    --success: #30d158;
    --warning: #ffd60a;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --radius: 14px;
    --radius-lg: 20px;
    --sa-top: env(safe-area-inset-top, 0);
    --sa-bot: env(safe-area-inset-bottom, 0);
    --sa-left: env(safe-area-inset-left, 0);
    --sa-right: env(safe-area-inset-right, 0);
    --header-h: 52px;
    --footer-h: 84px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f2f2f7;
      --bg-card: #ffffff;
      --bg-elevated: #ffffff;
      --bg-input: #ffffff;
      --text: #000000;
      --text-secondary: #3a3a3c;
      --text-muted: #8e8e93;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.16);
    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Hiragino Sans', sans-serif;
    background: var(--bg); color: var(--text);
    overscroll-behavior-y: none;
    -webkit-font-smoothing: antialiased;
    font-size: 16px; /* iOS のズーム回避 */
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
  }
  .hidden { display: none !important; }

  /* ─── 固定ヘッダー ─── */
  .app-header {
    position: sticky; top: 0; z-index: 50;
    padding: calc(var(--sa-top) + 8px) 16px 8px;
    background: rgba(10,10,10,0.9);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 0.5px solid var(--border);
  }
  @media (prefers-color-scheme: light) {
    .app-header { background: rgba(255,255,255,0.85); }
  }
  .app-header h1 {
    margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -0.2px;
  }
  .badge {
    background: var(--accent); color: #000;
    font-weight: 700; font-size: 13px;
    border-radius: 999px; padding: 3px 10px; min-width: 24px; text-align: center;
  }

  /* ─── メイン ─── */
  .app-main {
    padding: 12px 16px calc(var(--footer-h) + var(--sa-bot) + 12px);
    padding-left: calc(16px + var(--sa-left));
    padding-right: calc(16px + var(--sa-right));
    display: flex; flex-direction: column; gap: 14px;
    max-width: 520px; margin: 0 auto;
  }

  /* ─── カード ─── */
  .card {
    background: var(--bg-card); border-radius: var(--radius);
    padding: 14px 16px;
  }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .card-label {
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    letter-spacing: 0.2px; text-transform: uppercase;
  }
  .queue-count { font-size: 13px; color: var(--text-muted); }

  /* ─── 記事セレクタ ─── */
  .select-field, .text-field {
    width: 100%; padding: 14px 12px;
    background: var(--bg-input); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    font-size: 16px; font-family: inherit;
    appearance: none; -webkit-appearance: none;
  }
  .select-field {
    background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 20 20'%3E%3Cpath d='M5 8l5 5 5-5' stroke='%23999' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 36px;
  }
  .new-article-details {
    margin-top: 10px;
  }
  .new-article-details summary {
    list-style: none; cursor: pointer;
    color: var(--accent); font-size: 14px; font-weight: 500;
    padding: 8px 0; user-select: none;
  }
  .new-article-details summary::-webkit-details-marker { display: none; }
  .new-article-form { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }

  /* ─── アクション大ボタン（2+1）─── */
  .actions {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .action-tile {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--bg-card); border-radius: var(--radius);
    padding: 24px 12px;
    cursor: pointer; user-select: none;
    transition: transform 0.1s ease, background 0.1s ease;
    min-height: 110px;
  }
  .action-tile:active { transform: scale(0.97); background: var(--bg-elevated); }
  .action-tile.wide { grid-column: 1 / -1; flex-direction: row; justify-content: flex-start; padding: 18px 20px; min-height: 0; }
  .action-tile.wide .action-tile-icon { font-size: 26px; margin: 0 14px 0 0; }
  .action-tile.wide .action-tile-label { font-size: 16px; }
  .action-tile-icon { font-size: 36px; line-height: 1; margin-bottom: 10px; }
  .action-tile-label { font-size: 14px; font-weight: 600; color: var(--text); text-align: center; }

  /* ─── 一時保存キュー ─── */
  .queue-card { padding-bottom: 12px; }
  .queue-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
  }
  .queue-item {
    position: relative; aspect-ratio: 1;
    background: var(--bg-elevated); border-radius: 8px; overflow: hidden;
  }
  .queue-item img, .queue-item video {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .queue-item .type-badge {
    position: absolute; top: 4px; left: 4px;
    background: rgba(0,0,0,0.65); color: #fff;
    font-size: 10px; padding: 1px 5px; border-radius: 3px;
    font-weight: 600; letter-spacing: 0.3px;
  }
  .queue-item .delete-btn {
    position: absolute; top: 4px; right: 4px;
    background: rgba(0,0,0,0.65); color: #fff; border: none;
    width: 22px; height: 22px; border-radius: 50%;
    cursor: pointer; font-size: 14px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .queue-item .delete-btn:active { background: var(--danger); }
  .queue-item .status-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.8); color: #fff;
    font-size: 10px; text-align: center; padding: 2px;
  }
  .queue-empty {
    text-align: center; padding: 28px 8px;
    font-size: 13px; color: var(--text-muted);
  }

  /* ─── 状態表示 & 注意書き ─── */
  .status-line {
    text-align: center; min-height: 18px;
    font-size: 12px; color: var(--text-muted);
  }
  .note {
    margin: 0; padding: 10px 12px;
    background: var(--bg-card); border-radius: 10px;
    font-size: 12px; color: var(--text-muted); line-height: 1.5;
    border-left: 3px solid var(--warning);
  }

  .bottom-spacer { height: 20px; }

  /* ─── 固定ボタンバー ─── */
  .action-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    padding: 10px 16px calc(10px + var(--sa-bot));
    padding-left: calc(16px + var(--sa-left));
    padding-right: calc(16px + var(--sa-right));
    background: rgba(10,10,10,0.9);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-top: 0.5px solid var(--border);
    display: flex; gap: 10px; align-items: center;
  }
  @media (prefers-color-scheme: light) {
    .action-bar { background: rgba(255,255,255,0.85); }
  }

  .btn-primary {
    flex: 1; min-height: 52px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 8px 16px;
    background: var(--accent); color: #000; border: none;
    border-radius: 14px; font-size: 17px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: transform 0.1s, opacity 0.1s;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-primary-label { line-height: 1.2; }
  .btn-primary-sub { font-size: 12px; font-weight: 500; opacity: 0.7; margin-top: 2px; }
  .btn-primary-sub:empty { display: none; }

  .btn-ghost {
    min-height: 52px; padding: 0 18px;
    background: transparent; color: var(--danger);
    border: 1px solid var(--border-strong); border-radius: 14px;
    font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn-ghost:active { background: rgba(255,69,58,0.1); }
  .btn-ghost:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-secondary {
    min-height: 44px; padding: 0 14px;
    background: var(--bg-elevated); color: var(--text);
    border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn-secondary:active { opacity: 0.7; }

  /* ─── トースト ─── */
  .toast {
    position: fixed;
    bottom: calc(var(--footer-h) + var(--sa-bot) + 20px);
    left: 50%; transform: translateX(-50%);
    max-width: calc(100% - 32px);
    background: var(--bg-elevated); color: var(--text);
    padding: 12px 20px; border-radius: 999px;
    border: 1px solid var(--border-strong);
    font-size: 14px; z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    animation: slideUp 0.25s ease;
  }
  .toast.hidden { display: none; }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }
  @keyframes slideUp {
    from { transform: translate(-50%, 20px); opacity: 0; }
    to { transform: translate(-50%, 0); opacity: 1; }
  }

  /* iOS safari: input focus time avoid zoom */
  input, select, textarea { font-size: 16px !important; }

  /* MacBook desktop など広い画面でも見やすく */
  @media (min-width: 600px) {
    .app-main { padding: 16px 20px calc(var(--footer-h) + 20px); }
  }
</style>
